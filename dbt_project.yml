name: "marketing_dbt_pipeline" # <--- Isay 'docs' hata kar simple kar dein
version: "1.0.0"
config-version: 2

profile: "marketing_dbt_pipeline" # <--- Ye ab profiles.yml se match kar raha hai

model-paths: ["models"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  marketing_dbt_pipeline: # <--- Yahan bhi naam change karein (Jo 'name' mein rakha hai)
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
